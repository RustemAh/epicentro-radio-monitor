name: Verificar senales y publicar

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Verificar senales
        run: python src/checker.py
      - name: Commit estado
        run: |
          git config user.name "Epicentro Bot"
          git config user.email "bot@epicentroradio.com"
          git add data/estado.json
          git diff --staged --quiet || git commit -m "Senales actualizadas $(date '+%d/%m/%Y %H:%M')"
          git push
      - name: Generar HTML
        run: python src/build.py
      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
